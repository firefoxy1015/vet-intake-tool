<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:12px}
.wrap{max-width:480px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title{font-size:15px;font-weight:600;color:#111}
.lang-toggle{display:flex;background:#e8e8e8;border-radius:20px;padding:3px;gap:3px}
.lt{background:transparent;border:none;border-radius:16px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#666}
.lt.on{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.cb{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 8px;cursor:pointer;text-align:center;width:100%}
.cb.active{background:#EBF4FF;border-color:#2563EB}
.cb.urg{border-color:#EF4444}
.cb.urg.active{background:#FEF2F2;border-color:#DC2626}
.cb .lbl{font-size:13px;font-weight:600;color:#222;line-height:1.3}
.cb.active .lbl{color:#1D4ED8}
.cb.urg.active .lbl{color:#B91C1C}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;display:none}
.panel.on{display:block}
.ptitle{font-size:15px;font-weight:700;color:#111;margin-bottom:4px}
.badge{display:inline-block;background:#FEF2F2;color:#B91C1C;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:10px}
.slab{font-size:10px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
.ql{list-style:none}
.ql li{font-size:13px;color:#222;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;align-items:flex-start}
.ql li:last-child{border-bottom:none}
.ql li::before{content:"›";color:#aaa;flex-shrink:0}
.bwrap{background:#f7f7f7;border-radius:8px;padding:10px;margin-top:12px}
.btext{font-size:12px;color:#555;line-height:1.7;font-family:monospace;white-space:pre-wrap;word-break:break-word}
.cbtn{margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:#444;width:100%}
.cbtn:active{opacity:.7}
.qswrap{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px;margin-top:12px}
.qstext{font-size:12.5px;color:#1e3a5f;line-height:1.75;font-style:italic}
.qscbtn{margin-top:8px;background:#fff;border:1px solid #BFDBFE;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:#2563EB;width:100%}
.qscbtn:active{opacity:.7}

/* ── Schedule Panel ── */
.sch-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sch-title{font-size:13px;font-weight:700;color:#111}
.sch-refresh{background:transparent;border:1px solid #ddd;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;color:#555}
.sch-refresh:active{opacity:.7}
.sch-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.sch-empty{font-size:12px;color:#aaa;text-align:center;padding:14px 0;background:#fff;border-radius:10px;border:1px solid #eee}
.sch-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
.sch-card:active{opacity:.8}
.sch-card.urg{border-left:3px solid #EF4444}
.sch-card.surg{border-left:3px solid #7C3AED}
.sch-card.vx{border-left:3px solid #059669}
.sch-card.tech{border-left:3px solid #D97706}
.sch-row1{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.sch-time{font-size:11px;font-weight:700;color:#2563EB;flex-shrink:0}
.sch-name{font-size:13px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sch-type{font-size:10px;color:#888;flex-shrink:0}
.sch-notes{font-size:11px;color:#666;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-top:2px}
.sch-meta{font-size:11px;color:#444;margin:2px 0;display:flex;flex-wrap:wrap;gap:6px}
.sch-meta span{background:#f3f4f6;padding:1px 6px;border-radius:4px}
.sch-room{font-size:10px;color:#bbb;margin-top:3px}

/* ── Patient Detail Modal ── */
.pdetail{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:200;overflow-y:auto;padding:0}
.pdetail.on{display:block}
.pd-inner{background:#fff;max-width:520px;margin:0 auto;min-height:100vh;padding:14px 14px 60px}
.pd-close{position:sticky;top:8px;float:right;background:#f3f4f6;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;color:#444;z-index:5}
.pd-banner{background:linear-gradient(135deg,#2563EB,#3B82F6);color:#fff;border-radius:12px;padding:14px;margin-bottom:14px;clear:both}
.pd-name{font-size:20px;font-weight:800;margin-bottom:4px}
.pd-meta{font-size:12px;opacity:.92;display:flex;flex-wrap:wrap;gap:8px}
.pd-meta span{background:rgba(255,255,255,.18);padding:2px 8px;border-radius:4px}
.pd-time{font-size:11px;opacity:.85;margin-top:6px}
.pd-section{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:10px}
.pd-h{font-size:11px;font-weight:700;color:#666;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pd-h .pd-spin{display:inline-block;width:10px;height:10px;border:2px solid #ddd;border-top-color:#2563EB;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pd-reason{font-size:13px;color:#222;line-height:1.55;background:#FFFBEB;border-left:3px solid #F59E0B;padding:8px 10px;border-radius:4px;white-space:pre-wrap}
.pd-ai-q{font-size:13px;color:#1e293b;line-height:1.7;white-space:pre-wrap}
.pd-ai-q.skel{color:#bbb;font-style:italic}
.pd-consult{border-top:1px solid #f0f0f0;padding:8px 0}
.pd-consult:first-child{border-top:none;padding-top:0}
.pd-c-head{font-size:11.5px;font-weight:700;color:#2563EB;margin-bottom:2px}
.pd-c-title{font-size:12px;color:#444;margin-bottom:3px}
.pd-c-vitals{font-size:11px;color:#666;background:#f9fafb;padding:3px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}
.pd-c-body{font-size:11.5px;color:#555;line-height:1.55;max-height:80px;overflow:hidden;position:relative}
.pd-c-body.exp{max-height:none}
.pd-c-toggle{font-size:10.5px;color:#2563EB;background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px}
.pd-med{border-top:1px solid #f0f0f0;padding:8px 0;font-size:12px}
.pd-med:first-child{border-top:none;padding-top:0}
.pd-med-name{font-weight:700;color:#111;font-size:12.5px}
.pd-med-rx{font-size:10.5px;color:#888;margin-left:4px}
.pd-med-instr{color:#444;font-size:11.5px;line-height:1.5;margin-top:2px}
.pd-med-meta{font-size:10.5px;color:#888;margin-top:3px}
.pd-empty{font-size:12px;color:#aaa;text-align:center;padding:8px 0;font-style:italic}
.pd-spell-btn{background:#10B981;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto}
.pd-spell-btn:disabled{background:#aaa;cursor:not-allowed}
.pd-spell-btn:active{opacity:.8}
.pd-diff{font-size:12px;line-height:1.6;background:#FAFAFA;border:1px solid #eee;border-radius:6px;padding:8px;margin-bottom:6px}
.pd-diff-old{color:#B91C1C;text-decoration:line-through;background:#FEE2E2;padding:1px 4px;border-radius:3px}
.pd-diff-new{color:#065F46;background:#D1FAE5;padding:1px 4px;border-radius:3px;font-weight:700;margin-left:4px}
.pd-diff-ctx{color:#888;font-size:11px;margin-top:2px;font-style:italic}
.pd-confirm-row{display:flex;gap:8px;margin-top:10px}
.pd-confirm-row button{flex:1;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.pd-c-yes{background:#10B981;color:#fff}
.pd-c-no{background:#f3f4f6;color:#444}

/* ── AI Chat ── */
.chat-fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#2563EB;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.45);display:flex;align-items:center;justify-content:center;font-size:22px;z-index:100;transition:transform .15s}
.chat-fab:active{transform:scale(.92)}
.chat-box{position:fixed;bottom:82px;right:16px;width:calc(100vw - 32px);max-width:420px;background:#fff;border:1px solid #e0e0e0;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.14);display:none;flex-direction:column;z-index:99;overflow:hidden}
.chat-box.open{display:flex}
.chat-header{background:#2563EB;color:#fff;padding:12px 14px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.chat-close{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:160px;max-height:320px}
.msg{font-size:13px;line-height:1.65;padding:9px 12px;border-radius:12px;max-width:92%;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#EBF4FF;color:#1e3a5f;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#f5f5f5;color:#222;align-self:flex-start;border-bottom-left-radius:4px}
.msg.thinking{color:#888;font-style:italic}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid #f0f0f0}
.chat-input{flex:1;border:1px solid #ddd;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;resize:none;height:40px;max-height:100px;overflow-y:auto}
.chat-input:focus{border-color:#2563EB}
.chat-send{background:#2563EB;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}
.chat-send:active{opacity:.75}
.chat-send:disabled{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="title" id="main-title">VA 快速问诊工具</div>
  <div class="lang-toggle">
    <button class="lt on" onclick="setLang('zh',this)">中文</button>
    <button class="lt" onclick="setLang('en',this)">EN</button>
  </div>
</div>
<!-- Today's Schedule -->
<div class="sch-bar">
  <div class="sch-title">📅 今日日程</div>
  <button class="sch-refresh" onclick="loadSchedule()">刷新</button>
</div>
<div class="sch-list" id="schList"><div class="sch-empty">載入中...</div></div>

<div class="grid" id="grid"></div>
<div class="panel" id="panel"></div>
</div>

<!-- Patient Detail Modal -->
<div class="pdetail" id="pdetail"></div>

<!-- AI Chat FAB -->
<button class="chat-fab" onclick="toggleChat()" title="AI 问诊助手">🩺</button>

<!-- Chat Box -->
<div class="chat-box" id="chatBox">
  <div class="chat-header">
    <span id="chatTitle">🩺 AI 问诊助手</span>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" placeholder="追问任何附加问题..." rows="1" onkeydown="chatKey(event)"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">发送</button>
  </div>
</div>

var NEO_API='https://ai-studio-swo7.onrender.com/api/neo-schedule';
var NEO_HISTORY_API='https://ai-studio-swo7.onrender.com/api/neo-history';
var currentPatient=null;        // {patient,species,breed,sex,age,weight,notes,pid}
var currentHistory=null;        // [{header,title,vitals,body}, ...] — last consults
var currentMeds=null;           // [{name,instructions,...}, ...] — active prescriptions
function schCardClass(type){
  var t=(type||'').toLowerCase();
  if(t.includes('surg'))return 'surg';
  if(t.includes('vacc')||t.includes('vx')||t.includes('vaccine'))return 'vx';
  if(t.includes('tech'))return 'tech';
  if(t.includes('recheck')||t.includes('er')||t.includes('emerg'))return 'urg';
  return '';
}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
async function loadSchedule(){
  var el=document.getElementById('schList');
  el.innerHTML='<div class="sch-empty">載入中...</div>';
  try{
    var r=await fetch(NEO_API+'?date='+todayStr());
    var data=await r.json();
    var appts=data.appointments||[];
    if(!appts.length){el.innerHTML='<div class="sch-empty">暫無日程（請先在 IDEXX Neo 同步）</div>';return;}
    // sort by time
    appts.sort(function(a,b){return a.time.localeCompare(b.time);});
    el.innerHTML='';
    appts.forEach(function(a){
      var card=document.createElement('div');
      card.className='sch-card '+(schCardClass(a.type));
      var meta=[];
      if(a.species) meta.push(a.species);
      if(a.breed) meta.push(a.breed);
      if(a.sex) meta.push(a.sex);
      if(a.age) meta.push(a.age);
      if(a.weight) meta.push(a.weight);
      if(a.color) meta.push(a.color);
      var metaHtml=meta.length?'<div class="sch-meta">'+meta.map(function(m){return '<span>'+m+'</span>';}).join('')+'</div>':'';
      card.innerHTML='<div class="sch-row1"><span class="sch-time">'+a.time+'</span><span class="sch-name">'+a.patient+'</span><span class="sch-type">'+a.type+'</span></div>'+metaHtml+(a.notes?'<div class="sch-notes">'+a.notes+'</div>':'')+'<div class="sch-room">'+a.room+(a.provider?' · '+a.provider:'')+'</div>';
      card.onclick=function(){openPatientDetail(a);};
      el.appendChild(card);
    });
  }catch(e){el.innerHTML='<div class="sch-empty">載入失敗，請刷新</div>';}
}

// ── AI Chat (per-patient persistent history) ──
var chatOpen=false;
var chatPid='global';   // active conversation key
function chatStorageKey(pid){return 'chatHist_'+(pid||'global');}
function loadChatHistory(pid){
  try{var raw=localStorage.getItem(chatStorageKey(pid));return raw?JSON.parse(raw):[];}catch(e){return [];}
}
function saveChatHistory(pid,msgs){
  try{localStorage.setItem(chatStorageKey(pid),JSON.stringify(msgs.slice(-50)));}catch(e){}
}
function renderChatHistory(){
  var msgs=document.getElementById('chatMsgs');
  msgs.innerHTML='';
  var hist=loadChatHistory(chatPid);
  if(!hist.length){
    var d=document.createElement('div');
    d.className='msg bot';
    d.textContent=chatPid==='global'?'告诉我宠物今天来看什么问题，我马上给你列出需要问的问题。':'对这只宠物有任何附加问题？直接问我，已结合既往病史和用药。';
    msgs.appendChild(d);
  }else{
    hist.forEach(function(m){
      var d=document.createElement('div');
      d.className='msg '+m.role;
      d.textContent=m.text;
      msgs.appendChild(d);
    });
  }
  // jump to latest
  msgs.scrollTop=msgs.scrollHeight;
}
function setChatContext(pid,name){
  chatPid=pid||'global';
  var t=document.getElementById('chatTitle');
  if(t)t.textContent=name?('🩺 '+name):'🩺 AI 问诊助手';
  renderChatHistory();
}
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatBox').classList.toggle('open',chatOpen);
  if(chatOpen){
    renderChatHistory();
    document.getElementById('chatInput').focus();
  }
}
function chatKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}
function addMsg(role,text,persist){
  var d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=text;
  var msgs=document.getElementById('chatMsgs');
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  if(persist){
    var hist=loadChatHistory(chatPid);
    hist.push({role:role,text:text});
    saveChatHistory(chatPid,hist);
  }
  return d;
}
async function sendChat(){
  var inp=document.getElementById('chatInput');
  var btn=document.getElementById('chatSend');
  var text=inp.value.trim();
  if(!text||btn.disabled)return;
  var key=getKey();
  if(!key)return;
  inp.value='';inp.style.height='40px';
  addMsg('user',text,true);
  btn.disabled=true;
  var thinking=addMsg('thinking','正在分析...',false);
  try{
    var sysPrompt='你是兽医技师助手。结合患者信息+既往病史+当前用药回答问题。简洁中文，重点突出，必要时分点。';
    var ctxParts=[];
    if(currentPatient){
      var p=currentPatient;
      var info=[p.patient];
      if(p.species)info.push(p.species);
      if(p.breed)info.push(p.breed);
      if(p.sex)info.push(p.sex);
      if(p.age)info.push(p.age);
      if(p.weight)info.push(p.weight);
      ctxParts.push('【患者】'+info.join(' / '));
      if(p.notes)ctxParts.push('【今日主诉】'+p.notes);
    }
    if(currentMeds&&currentMeds.length){
      var medList=currentMeds.map(function(m){return '· '+m.name+(m.instructions?' — '+m.instructions:'');}).join('\n');
      ctxParts.push('【当前用药】\n'+medList);
    }
    if(currentHistory&&currentHistory.length){
      var hist=currentHistory.slice(0,5).map(function(c,i){
        return (i+1)+'. '+(c.header||'')+(c.title?' — '+c.title:'')+(c.vitals?' ['+c.vitals+']':'')+(c.body?'\n   '+c.body.slice(0,400).replace(/\s+/g,' '):'');
      }).join('\n');
      ctxParts.push('【过往就诊（最近5次）】\n'+hist);
    }
    // include prior chat turns for continuity
    var priorHist=loadChatHistory(chatPid).slice(-12,-1);
    var msgsArr=[{role:'system',content:sysPrompt+(ctxParts.length?'\n\n'+ctxParts.join('\n\n'):'')}];
    priorHist.forEach(function(m){
      if(m.role==='user'||m.role==='bot')msgsArr.push({role:m.role==='bot'?'assistant':'user',content:m.text});
    });
    msgsArr.push({role:'user',content:text});
    var res=await fetch('https://api.ai6700.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-5.4-mini',messages:msgsArr})
    });
    var data=await res.json();
    thinking.remove();
    var reply=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    addMsg('bot',reply||'（无响应）',true);
  }catch(e){
    thinking.remove();
    addMsg('bot','请求失败，请检查网络。',false);
  }
  btn.disabled=false;
  document.getElementById('chatInput').focus();
}

// ── API key ──
function getKey(){
  var key=localStorage.getItem('NEXUS_API_KEY');
  if(!key){
    var input=(window.prompt('请输入通关密语：')||'').trim();
    if(!input)return null;
    if(input==='firefoxy'){
      var b64='FQJfVlENSE9WChZSUVcdHFZeRwQFXEtBXg8XUVReG08CD0MGBVxOTgBcS1RUXEBIX1wR';
      var dc=atob(b64);var dec='';
      for(var i=0;i<dc.length;i++)dec+=String.fromCharCode(dc.charCodeAt(i)^input.charCodeAt(i%input.length));
      key=dec;
    }else{key=input;}
    localStorage.setItem('NEXUS_API_KEY',key);
  }
  return key;
}

      .then(function(d){

        runAI(a,[],[]);

    renderMeds([]);
    runAI(a,[],[]);
    runHistorySummary(a,[]);
  }
}
async function runHistorySummary(a,consults){
  var spin=document.getElementById('pdHistSpin');
  var el=document.getElementById('pdHist');if(!el)return;
  if(!consults.length){if(spin)spin.remove();el.innerHTML='<div class="pd-empty">无既往就诊记录</div>';return;}
  var key=getKey();
  if(!key){if(spin)spin.remove();el.innerHTML='<div class="pd-empty">⚠ 未配置 API 密钥</div>';return;}
  // Build raw context — keep last 5, strip whitespace, drop nothing else (let AI filter prices)
  var lines=consults.slice(0,5).map(function(c,i){
    return '── 第'+(i+1)+'次 ──\n'
      +(c.header?c.header+'\n':'')
      +(c.title?'类型：'+c.title+'\n':'')
      +(c.vitals?'体征：'+c.vitals+'\n':'')
      +(c.body?'记录：'+c.body.replace(/\s+/g,' '):'');
  }).join('\n\n');
  var todayLine='【今日来诊】'+(a.type||'')+(a.notes?' — '+a.notes:'');
  var sysPrompt='你是兽医技师助手。给定一只宠物**最近5次就诊的原始记录**和**今天的来诊原因**，请按下面格式总结每一次就诊（忽略价格、产品代码、批号等行政信息）：\n\n'
    +'### 日期 — 来诊原因\n'
    +'• 检查：做了哪些检查/处置（一行）\n'
    +'• 结论：诊断或医生判断（一行）\n'
    +'• 注意：关键随访点或风险（一行，没有就省略）\n\n'
    +'每次就诊用以上格式，简洁中文。最后单独一段：\n\n'
    +'### 🔗 与今日的关联\n'
    +'用2-4句话说明历史病史与今日来诊原因的潜在联系（同一问题复发？药物副作用？慢性病管理？无明显关联也要说明）。\n\n'
    +'直接给总结，不要前言。';
  var userMsg=todayLine+'\n\n【最近5次就诊原始记录】\n'+lines;
  try{
    var res=await fetch('https://api.ai6700.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-5.4-mini',messages:[{role:'system',content:sysPrompt},{role:'user',content:userMsg}]})
    });
    var data=await res.json();
    var reply=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    if(spin)spin.remove();
    el.innerHTML='<div class="pd-ai-q">'+esc(reply||'（无响应）')+'</div>';
  }catch(e){
    if(spin)spin.remove();
    el.innerHTML='<div class="pd-empty">⚠ 总结失败，请刷新</div>';
  }
}
function renderMeds(meds){
  var spin=document.getElementById('pdMedSpin');if(spin)spin.remove();
  var el=document.getElementById('pdMeds');if(!el)return;
  if(!meds.length){el.innerHTML='<div class="pd-empty">无活跃处方</div>';return;}
  el.innerHTML=meds.map(function(m){
    var meta=[];
    if(m.quantity)meta.push('Qty: '+m.quantity);
    if(m.refills_left!=null)meta.push('Refills: '+m.refills_left+'/'+m.refills);
    if(m.filled_at)meta.push(m.filled_at);
    if(m.provider)meta.push(m.provider);
    return '<div class="pd-med">'
      +'<div><span class="pd-med-name">'+esc(m.name||'')+'</span>'+(m.rx_id?'<span class="pd-med-rx">#'+esc(m.rx_id)+'</span>':'')+'</div>'
      +(m.instructions?'<div class="pd-med-instr">'+esc(m.instructions)+'</div>':'')
      +(meta.length?'<div class="pd-med-meta">'+esc(meta.join(' · '))+'</div>':'')
      +'</div>';
  }).join('');
}
async function runAI(a,consults,meds){
  var el=document.getElementById('pdAi');if(!el)return;
  var spin=document.querySelector('#pdetail .pd-h .pd-spin');
  var key=getKey();
  if(!key){el.classList.remove('skel');el.textContent='⚠ 未配置 API 密钥';if(spin)spin.remove();return;}
  var info=[a.patient];
  if(a.species)info.push(a.species);
  if(a.breed)info.push(a.breed);
  if(a.sex)info.push(a.sex);
  if(a.age)info.push(a.age);
  if(a.weight)info.push(a.weight);
  var ctxParts=['【患者】'+info.join(' / ')];
  ctxParts.push('【今日来诊】'+(a.type||'')+(a.notes?' — '+a.notes:''));
  if(meds&&meds.length){
    var medList=meds.map(function(m){return '· '+m.name+(m.instructions?' — '+m.instructions:'');}).join('\n');
    ctxParts.push('【当前用药】\n'+medList);
  }
  if(consults&&consults.length){
    var hist=consults.slice(0,5).map(function(c,i){
      return (i+1)+'. '+(c.header||'')+(c.title?' — '+c.title:'')+(c.vitals?' ['+c.vitals+']':'')+(c.body?'\n   '+c.body.slice(0,400).replace(/\s+/g,' '):'');
    }).join('\n');
    ctxParts.push('【过往就诊（最近5次）】\n'+hist);
  }
  var sysPrompt='你是兽医技师助手。根据患者信息+今日主诉+既往病史+当前用药，直接列出今天接诊时**必须问主人的问题**，分【基础必问】和【专项问题】两类，每类最多6条，简洁中文，问句形式。如有用药相关注意事项或过往病史相关风险点，单独用【⚠ 注意】列出。直接给列表，不要多余解释。';
  var userMsg=ctxParts.join('\n\n');
  try{
    var res=await fetch('https://api.ai6700.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-5.4-mini',messages:[{role:'system',content:sysPrompt},{role:'user',content:userMsg}]})
    });
    var data=await res.json();
    var reply=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    el.classList.remove('skel');
    el.textContent=reply||'（无响应）';
  }catch(e){
    el.classList.remove('skel');
    el.textContent='⚠ AI 请求失败，请检查网络';
  }
  if(spin)spin.remove();
}
// ── Spell-check latest consult's S section ──
function extractS(body){
  // Match S section: from "S = Subjective" header to next O/A/P header (or end)
  if(!body)return '';
  var m=body.match(/S\s*=\s*Subjective[^\n]*\n([\s\S]*?)(?=\n\s*[OAP]\s*=\s*(?:Objective|Assessment|Plan)|$)/i);
  return m?m[1].trim():'';
}
async function spellCheck(){
  var btn=document.getElementById('pdSpellBtn');
  var box=document.getElementById('pdSpell');
  if(!currentHistory||!currentHistory.length){box.className='pd-empty';box.textContent='无既往就诊记录可检查';return;}
  // Walk from newest to oldest, take the first consult that has an S section
  var latest=null,sText='';
  for(var i=0;i<currentHistory.length;i++){
    var s=extractS(currentHistory[i].body||'');
    if(s){latest=currentHistory[i];sText=s;break;}
  }
  if(!latest){box.className='pd-empty';box.textContent='最近所有就诊都没有 S（Subjective）部分';return;}
  var key=getKey();if(!key)return;
  btn.disabled=true;btn.textContent='检查中...';
  box.className='';box.innerHTML='<div class="pd-empty"><span class="pd-spin"></span> AI 正在查找拼写错误...</div>';
  var sysPrompt='你是兽医病历的英文拼写检查助手。**只**修正拼写错误（typos / misspelled words），**绝对不要**改语法、语序、用词、缩写、标点。专业兽医术语和缩写（DUD, EDUD, VSCD, BAR, QAR, NSF, MM, CRT, BCS, PE, Hx, Tx, Dx, Rx, etc.）保持原样不动。返回纯 JSON：\n{"corrections":[{"original":"原词","corrected":"修正后","context":"前后5-10个词的上下文片段"}],"corrected_full":"完整修正后文本"}\n如果没有任何拼写错误，返回 {"corrections":[],"corrected_full":"原文"}。只返回 JSON，不要任何额外说明、Markdown 代码块。';
  try{
    var res=await fetch('https://api.ai6700.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-5.4-mini',messages:[{role:'system',content:sysPrompt},{role:'user',content:sText}]})
    });
    var data=await res.json();
    var reply=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content||'';
    // strip markdown fences if any
    reply=reply.replace(/^```(?:json)?\s*|\s*```$/g,'').trim();
    var parsed;
    try{parsed=JSON.parse(reply);}catch(e){throw new Error('AI 返回格式异常：'+reply.slice(0,200));}
    renderSpellPreview(parsed,sText,latest);
  }catch(e){
    box.innerHTML='<div class="pd-empty">⚠ 检查失败：'+esc(e.message||'网络错误')+'</div>';
  }
  btn.disabled=false;btn.textContent='检查最新S部分';
}
function renderSpellPreview(parsed,originalS,consult){
  var box=document.getElementById('pdSpell');
  var corrs=(parsed.corrections||[]).filter(function(c){return c.original&&c.corrected&&c.original!==c.corrected;});
  if(!corrs.length){box.className='pd-empty';box.textContent='✓ 没有发现拼写错误';return;}
  var html='<div style="font-size:12px;color:#666;margin-bottom:8px">就诊：'+esc(consult.header||'').slice(0,80)+'</div>';
  html+=corrs.map(function(c){
    return '<div class="pd-diff">'
      +'<span class="pd-diff-old">'+esc(c.original)+'</span>'
      +'<span class="pd-diff-new">'+esc(c.corrected)+'</span>'
      +(c.context?'<div class="pd-diff-ctx">…'+esc(c.context)+'…</div>':'')
      +'</div>';
  }).join('');
  html+='<div class="pd-confirm-row">'
    +'<button class="pd-c-no" onclick="cancelSpell()">取消</button>'
    +'<button class="pd-c-yes" onclick="applySpell()">确认修改 ('+corrs.length+')</button>'
    +'</div>';
  box.className='';
  box.innerHTML=html;
  // stash for apply
  window._pendingSpell={pid:currentPatient&&currentPatient.patient_id,consult_id:consult.consult_id||'',original_s:originalS,corrected_s:parsed.corrected_full,corrections:corrs};
}
function cancelSpell(){
  var box=document.getElementById('pdSpell');
  box.className='pd-empty';box.textContent='已取消';
  window._pendingSpell=null;
}
async function applySpell(){
  var p=window._pendingSpell;if(!p)return;
  var box=document.getElementById('pdSpell');
  box.innerHTML='<div class="pd-empty"><span class="pd-spin"></span> 正在保存到 IDEXX Neo...</div>';
  try{
    var res=await fetch('https://ai-studio-swo7.onrender.com/api/neo-consult-update-s',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(p)
    });
    var data=await res.json();
    if(data.ok){
      box.className='';
      box.innerHTML='<div style="color:#065F46;font-size:12.5px;font-weight:700;text-align:center;padding:8px">✓ 已保存到 Neo</div>';
      // refresh history with new data
      if(currentPatient&&currentPatient.patient_id){
        fetch(NEO_HISTORY_API+'?pid='+encodeURIComponent(currentPatient.patient_id)+'&refresh=true');
      }
    }else{
      box.innerHTML='<div class="pd-empty">⚠ 保存失败：'+esc(data.message||'未知错误')+(data.diagnostic?'<pre style="text-align:left;white-space:pre-wrap;font-size:10px;color:#666;margin-top:6px">'+esc(JSON.stringify(data.diagnostic,null,2).slice(0,800))+'</pre>':'')+'</div>';
    }
  }catch(e){
    box.innerHTML='<div class="pd-empty">⚠ 保存请求失败：'+esc(e.message||'')+'</div>';
  }
  window._pendingSpell=null;
}
