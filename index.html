<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:12px}
.wrap{max-width:480px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title{font-size:15px;font-weight:600;color:#111}
.lang-toggle{display:flex;background:#e8e8e8;border-radius:20px;padding:3px;gap:3px}
.lt{background:transparent;border:none;border-radius:16px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#666}
.lt.on{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.cb{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 8px;cursor:pointer;text-align:center;width:100%}
.cb.active{background:#EBF4FF;border-color:#2563EB}
.cb.urg{border-color:#EF4444}
.cb.urg.active{background:#FEF2F2;border-color:#DC2626}
.cb .lbl{font-size:13px;font-weight:600;color:#222;line-height:1.3}
.cb.active .lbl{color:#1D4ED8}
.cb.urg.active .lbl{color:#B91C1C}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;display:none}
.panel.on{display:block}
.ptitle{font-size:15px;font-weight:700;color:#111;margin-bottom:4px}
.badge{display:inline-block;background:#FEF2F2;color:#B91C1C;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:10px}
.slab{font-size:10px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
.ql{list-style:none}
.ql li{font-size:13px;color:#222;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;align-items:flex-start}
.ql li:last-child{border-bottom:none}
.ql li::before{content:"›";color:#aaa;flex-shrink:0}
.bwrap{background:#f7f7f7;border-radius:8px;padding:10px;margin-top:12px}
.btext{font-size:12px;color:#555;line-height:1.7;font-family:monospace;white-space:pre-wrap;word-break:break-word}
.cbtn{margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:#444;width:100%}
.cbtn:active{opacity:.7}
.qswrap{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px;margin-top:12px}
.qstext{font-size:12.5px;color:#1e3a5f;line-height:1.75;font-style:italic}
.qscbtn{margin-top:8px;background:#fff;border:1px solid #BFDBFE;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:#2563EB;width:100%}
.qscbtn:active{opacity:.7}

/* ── AI Chat ── */
.chat-fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:#2563EB;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.45);display:flex;align-items:center;justify-content:center;font-size:22px;z-index:100;transition:transform .15s}
.chat-fab:active{transform:scale(.92)}
.chat-box{position:fixed;bottom:82px;right:16px;width:calc(100vw - 32px);max-width:420px;background:#fff;border:1px solid #e0e0e0;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.14);display:none;flex-direction:column;z-index:99;overflow:hidden}
.chat-box.open{display:flex}
.chat-header{background:#2563EB;color:#fff;padding:12px 14px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.chat-close{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:160px;max-height:320px}
.msg{font-size:13px;line-height:1.65;padding:9px 12px;border-radius:12px;max-width:92%;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#EBF4FF;color:#1e3a5f;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#f5f5f5;color:#222;align-self:flex-start;border-bottom-left-radius:4px}
.msg.thinking{color:#888;font-style:italic}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid #f0f0f0}
.chat-input{flex:1;border:1px solid #ddd;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;resize:none;height:40px;max-height:100px;overflow-y:auto}
.chat-input:focus{border-color:#2563EB}
.chat-send{background:#2563EB;color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}
.chat-send:active{opacity:.75}
.chat-send:disabled{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="title" id="main-title">VA 快速问诊工具</div>
  <div class="lang-toggle">
    <button class="lt on" onclick="setLang('zh',this)">中文</button>
    <button class="lt" onclick="setLang('en',this)">EN</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<div class="panel" id="panel"></div>
</div>

<!-- AI Chat FAB -->
<button class="chat-fab" onclick="toggleChat()" title="AI 问诊助手">🩺</button>

<!-- Chat Box -->
<div class="chat-box" id="chatBox">
  <div class="chat-header">
    <span>🩺 AI 问诊助手</span>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="msg bot">告诉我宠物今天来看什么问题，我马上给你列出需要问的问题。</div>
  </div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" placeholder="例：猫咪吐了3次，有血..." rows="1" onkeydown="chatKey(event)"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">发送</button>
  </div>
</div>

var order=['vd','app','uri','resp','cough','pain','eye','ear','skin','neuro','toxin','well'];
function buildGrid(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  order.forEach(function(k){
    var d=D[k][lang];
    var btn=document.createElement('button');
    btn.className='cb'+(d.u?' urg':'');
    btn.dataset.c=k;
    btn.onclick=function(){sel(this)};
    if(cur===k)btn.classList.add('active');
    btn.innerHTML='<div class="lbl">'+d.t+(d.u?' !':'')+'</div>';
    g.appendChild(btn);
  });
}
function sel(btn){
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  cur=btn.dataset.c;
  renderPanel();
}
function renderPanel(){
  if(!cur)return;
  var d=D[cur][lang];
  var l=T[lang];
  var p=document.getElementById('panel');
  p.className='panel on';
  p.innerHTML='<div class="ptitle">'+d.t+'</div>'
    +(d.u?'<div class="badge">'+d.un+'</div>':'')
    +'<div class="qswrap"><div class="slab">'+l.qsLabel+'</div>'
    +'<div class="qstext" id="qst">'+d.qs+'</div>'
    +'<button class="qscbtn" onclick="cpqs()">'+l.qscopy+'</button></div>'
    +'<div class="slab">'+l.basicLabel+'</div>'
    +'<ul class="ql">'+d.b.map(function(q){return'<li>'+q+'</li>'}).join('')+'</ul>'
    +'<div class="slab">'+l.specLabel+'</div>'
    +'<ul class="ql">'+d.s.map(function(q){return'<li>'+q+'</li>'}).join('')+'</ul>'
    +'<div class="bwrap"><div class="slab">'+l.briefLabel+'</div>'
    +'<div class="btext" id="bt">'+d.br+'</div>'
    +'<button class="cbtn" onclick="cp()">'+l.copy+'</button></div>';
}
function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lt').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.getElementById('main-title').textContent=T[lang].title;
  buildGrid();
  renderPanel();
}
function cp(){
  var t=document.getElementById('bt').innerText;
  navigator.clipboard.writeText(t).catch(function(){});
  var b=document.querySelector('.cbtn');
  b.textContent=T[lang].copied;
  setTimeout(function(){b.textContent=T[lang].copy},1500);
}
function cpqs(){
  var t=document.getElementById('qst').innerText;
  navigator.clipboard.writeText(t).catch(function(){});
  var b=document.querySelector('.qscbtn');
  b.textContent=T[lang].qscopied;
  setTimeout(function(){b.textContent=T[lang].qscopy},1500);
}
buildGrid();

// ── AI Chat ──
var chatOpen=false;
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatBox').classList.toggle('open',chatOpen);
  if(chatOpen)document.getElementById('chatInput').focus();
}
function chatKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}
function addMsg(role,text){
  var d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=text;
  var msgs=document.getElementById('chatMsgs');
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}
function getKey(){
  var key=localStorage.getItem('NEXUS_API_KEY');
  if(!key){
    var input=(window.prompt('请输入通关密语：')||'').trim();
    if(!input)return null;
    if(input==='firefoxy'){
      var b64='FQJfVlENSE9WChZSUVcdHFZeRwQFXEtBXg8XUVReG08CD0MGBVxOTgBcS1RUXEBIX1wR';
      var dc=atob(b64);var dec='';
      for(var i=0;i<dc.length;i++)dec+=String.fromCharCode(dc.charCodeAt(i)^input.charCodeAt(i%input.length));
      key=dec;
    }else{key=input;}
    localStorage.setItem('NEXUS_API_KEY',key);
  }
  return key;
}
async function sendChat(){
  var inp=document.getElementById('chatInput');
  var btn=document.getElementById('chatSend');
  var text=inp.value.trim();
  if(!text||btn.disabled)return;
  var key=getKey();
  if(!key)return;
  inp.value='';inp.style.height='40px';
  addMsg('user',text);
  btn.disabled=true;
  var thinking=addMsg('thinking','正在分析...');
  try{
    var res=await fetch('https://api.ai6700.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'gpt-5.4-mini',
        messages:[
          {role:'system',content:'兽医问诊助手。根据主诉列出需问的问题，分【基础必问】和【专项问题】，每部分最多6条，简洁，中文。直接给列表。'},
          {role:'user',content:text}
        ]
      })
    });
    var data=await res.json();
    thinking.remove();
    var reply=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    addMsg('bot',reply||'（无响应）');
  }catch(e){
    thinking.remove();
    addMsg('bot','请求失败，请检查网络。');
  }
  btn.disabled=false;
  document.getElementById('chatInput').focus();
}
</script>
