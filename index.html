<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:12px}
.wrap{max-width:480px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title{font-size:15px;font-weight:600;color:#111}
.lang-toggle{display:flex;background:#e8e8e8;border-radius:20px;padding:3px;gap:3px}
.lt{background:transparent;border:none;border-radius:16px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#666}
.lt.on{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.cb{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 8px;cursor:pointer;text-align:center;width:100%}
.cb.active{background:#EBF4FF;border-color:#2563EB}
.cb.urg{border-color:#EF4444}
.cb.urg.active{background:#FEF2F2;border-color:#DC2626}
.cb .lbl{font-size:13px;font-weight:600;color:#222;line-height:1.3}
.cb.active .lbl{color:#1D4ED8}
.cb.urg.active .lbl{color:#B91C1C}
.panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;display:none}
.panel.on{display:block}
.ptitle{font-size:15px;font-weight:700;color:#111;margin-bottom:4px}
.badge{display:inline-block;background:#FEF2F2;color:#B91C1C;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:10px}
.slab{font-size:10px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
.ql{list-style:none}
.ql li{font-size:13px;color:#222;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;align-items:flex-start}
.ql li:last-child{border-bottom:none}
.ql li::before{content:"›";color:#aaa;flex-shrink:0}
.bwrap{background:#f7f7f7;border-radius:8px;padding:10px;margin-top:12px}
.btext{font-size:12px;color:#555;line-height:1.7;font-family:monospace;white-space:pre-wrap;word-break:break-word}
.cbtn{margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;color:#444;width:100%}
.cbtn:active{opacity:.7}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="title" id="main-title">VA 快速问诊工具</div>
  <div class="lang-toggle">
    <button class="lt on" onclick="setLang('zh',this)">中文</button>
    <button class="lt" onclick="setLang('en',this)">EN</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<div class="panel" id="panel"></div>
</div>

},

zh:{t:'疼痛 / 跛行',u:0,b:['主诉 & 开始时间','是否加重','进食饮水情况','精神状态'],s:['哪条腿/哪个部位','突发 or 渐进','外伤史？','是否负重','肿胀？','疼痛评分(0-5)'],br:'姓名___ 年龄___ 性别___\n部位：___ 始于 ___\n[突发/渐进] 外伤？[Y/N]\n负重？[Y/N] 肿胀？[Y/N]\n疼痛评分：___/5'},
en:{t:'Pain / Limping',u:0,b:['Chief complaint & onset','Getting worse?','Eating & drinking','Energy level'],s:['Which leg or area?','Sudden or gradual onset?','Known trauma?','Weight-bearing?','Swelling?','Pain score (0–5)'],br:'Name___ Age___ Sex___\nLocation: ___ Onset: ___\n[Sudden / Gradual] Trauma? [Y/N]\nWeight-bearing? [Y/N] Swelling? [Y/N]\nPain score: ___/5'}
},

zh:{t:'眼部问题',u:0,b:['主诉 & 开始时间','是否加重','进食饮水情况','精神状态'],s:['左/右/双眼','发红？','分泌物颜色（透明/黄/绿）','眯眼/闭眼？','用爪抓眼？','角膜混浊？','外伤史？'],br:'姓名___ 年龄___ 性别___\n患眼：[左/右/双] 始于 ___\n发红？[Y/N] 分泌物：[透明/黄/绿]\n眯眼？[Y/N] 爪抓？[Y/N]\n混浊？[Y/N] 外伤？[Y/N]'},
en:{t:'Eye Problem',u:0,b:['Chief complaint & onset','Getting worse?','Eating & drinking','Energy level'],s:['Which eye (L/R/both)?','Redness?','Discharge color (clear/yellow/green)?','Squinting or closed?','Pawing at eye?','Cloudy cornea?','Trauma?'],br:'Name___ Age___ Sex___\nEye: [L/R/Both] Onset: ___\nRedness? [Y/N] Discharge: [clear/yellow/green]\nSquinting? [Y/N] Pawing? [Y/N]\nCloudy? [Y/N] Trauma? [Y/N]'}
},
ear:{
zh:{t:'耳部问题',u:0,b:['主诉 & 开始时间','是否加重','进食饮水情况','精神状态'],s:['左/右/双耳','摇头？','挠耳？','异味？','分泌物颜色','疼痛反应？','既往耳部感染？'],br:'姓名___ 年龄___ 性别___\n患耳：[左/右/双] 始于 ___\n摇头？[Y/N] 挠耳？[Y/N]\n异味？[Y/N] 分泌物颜色：___\n疼痛？[Y/N] 既往感染？[Y/N]'},
en:{t:'Ear Problem',u:0,b:['Chief complaint & onset','Getting worse?','Eating & drinking','Energy level'],s:['Which ear (L/R/both)?','Head shaking?','Scratching at ear?','Odor?','Discharge color?','Pain response?','Previous ear infections?'],br:'Name___ Age___ Sex___\nEar: [L/R/Both] Onset: ___\nHead shaking? [Y/N] Scratching? [Y/N]\nOdor? [Y/N] Discharge color: ___\nPain? [Y/N] Prev infections? [Y/N]'}
},

zh:{t:'皮肤 / 肿块',u:0,b:['主诉 & 开始时间','是否加重','进食饮水情况','精神状态'],s:['位置','首次发现时间','瘙痒？','舔咬/抓挠？','是否扩散','破溃/渗液？','是否变大'],br:'姓名___ 年龄___ 性别___\n位置：___ 首发：___\n瘙痒？[Y/N] 舔咬？[Y/N]\n扩散？[Y/N] 破溃/渗液？[Y/N]\n变大？[Y/N]'},

},

zh:{t:'神经症状',u:1,un:'⚠ 立即通知医生',b:['主诉 & 开始时间','进食饮水情况','精神状态'],s:['是否首次发作','持续时间','发作经过描述','是否恢复正常','意识丧失？','是否排便/排尿','可能毒物接触？'],br:'姓名___ 年龄___ 性别___\n发生时间：___\n首次？[Y/N] 持续：___\n表现：___\n恢复？[Y/N] 意识丧失？[Y/N]\n排便/尿？[Y/N] 毒物？___\n⚠ 立即通知医生'},
en:{t:'Neurological / Seizure',u:1,un:'⚠ Notify doctor now',b:['Chief complaint & onset','Eating & drinking','Energy level'],s:['First episode?','How long did it last?','What happened (describe)?','Did pet recover?','Loss of consciousness?','Urinated or defecated?','Possible toxin exposure?'],br:'Name___ Age___ Sex___\nTime of episode: ___\nFirst episode? [Y/N] Duration: ___\nDescription: ___\nRecovered? [Y/N] LOC? [Y/N]\nUrinated/defecated? [Y/N] Possible toxin: ___\n⚠ Notify doctor immediately'}
},
toxin:{
zh:{t:'中毒 / 异物',u:1,un:'⚠ 立即通知医生',b:['主诉 & 开始时间','进食饮水情况','精神状态'],s:['摄入物质','摄入量','摄入时间','是否有包装/照片','是否呕吐','是否腹泻','目前是否仍能接触'],br:'姓名___ 年龄___ 性别___\n摄入物：___ 量：___\n时间：___\n有包装/照片？[Y/N]\n呕吐？[Y/N] 腹泻？[Y/N]\n仍可接触？[Y/N]\n⚠ 立即通知医生'},

},

zh:{t:'健康检查',u:0,b:['来诊目的','进食饮水情况','大小便情况','精神状态'],s:['年检/疫苗/一般检查','饮食正常？','饮水正常？','排尿正常？','大便正常？','室内/外','其他关注'],br:'姓名___ 年龄___ 性别___\n目的：[年检/疫苗/一般]\n饮食：[正常/异常] 饮水：[正常/异常]\n排尿：[正常/异常] 大便：[正常/异常]\n室内/外：___ 关注：___'},
en:{t:'Wellness Visit',u:0,b:['Reason for visit','Eating & drinking','Urination & defecation','Energy level'],s:['Annual exam / vaccines / check?','Eating normally?','Drinking normally?','Urinating normally?','BMs normal?','Indoor or outdoor?','Any concerns?'],br:'Name___ Age___ Sex___\nReason: [annual/vaccines/check]\nEating: [normal/abnormal] Drinking: [normal/abnormal]\nUrinating: [normal/abnormal] BMs: [normal/abnormal]\nIndoor/Outdoor: ___ Concerns: ___'}
}
};
var order=['vd','app','uri','resp','cough','pain','eye','ear','skin','neuro','toxin','well'];
function buildGrid(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  order.forEach(function(k){
    var d=D[k][lang];
    var btn=document.createElement('button');
    btn.className='cb'+(d.u?' urg':'');
    btn.dataset.c=k;
    btn.onclick=function(){sel(this)};
    if(cur===k)btn.classList.add('active');
    btn.innerHTML='<div class="lbl">'+d.t+(d.u?' !':'')+'</div>';
    g.appendChild(btn);
  });
}
function sel(btn){
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  cur=btn.dataset.c;
  renderPanel();
}
function renderPanel(){
  if(!cur)return;
  var d=D[cur][lang];
  var l=T[lang];
  var p=document.getElementById('panel');
  p.className='panel on';
  p.innerHTML='<div class="ptitle">'+d.t+'</div>'
    +(d.u?'<div class="badge">'+d.un+'</div>':'')
    +'<div class="slab">'+l.basicLabel+'</div>'
    +'<ul class="ql">'+d.b.map(function(q){return'<li>'+q+'</li>'}).join('')+'</ul>'
    +'<div class="slab">'+l.specLabel+'</div>'
    +'<ul class="ql">'+d.s.map(function(q){return'<li>'+q+'</li>'}).join('')+'</ul>'
    +'<div class="bwrap"><div class="slab">'+l.briefLabel+'</div>'
    +'<div class="btext" id="bt">'+d.br+'</div>'
    +'<button class="cbtn" onclick="cp()">'+l.copy+'</button></div>';
}
function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lt').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  document.getElementById('main-title').textContent=T[lang].title;
  buildGrid();
  renderPanel();
}
function cp(){
  var t=document.getElementById('bt').innerText;
  navigator.clipboard.writeText(t).catch(function(){});
  var b=document.querySelector('.cbtn');
  b.textContent=T[lang].copied;
  setTimeout(function(){b.textContent=T[lang].copy},1500);
}
buildGrid();
</script>
</body>
</html>
